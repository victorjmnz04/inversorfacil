---
layout: default
---

<article class="post">
  <header class="post-header">
    <span class="post-category">Guía</span>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">Actualizado: {{ page.date | date: "%d/%m/%Y" }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>

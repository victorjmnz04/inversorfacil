<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        📈 {{ site.title }}
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/brokers' | relative_url }}">Brokers</a>
        <a href="{{ '/guias' | relative_url }}">Guías</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 {{ site.title }} · Contenido informativo, no asesoramiento financiero.</p>
    </div>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <link rel="icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        📈 Inversor<span>Fácil</span>
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/brokers' | relative_url }}">Brokers</a>
        <a href="{{ '/guias' | relative_url }}">Guías</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>
        <a href="#">Inicio</a>
        <a href="#">Sobre nosotros</a>
        <a href="#">Aviso legal</a>
        <a href="#">Política de privacidad</a>
      </div>
      <p>© 2026 InversorFácil · Contenido informativo, no asesoramiento financiero.</p>
    </div>
  </footer>

</body>
</html>
